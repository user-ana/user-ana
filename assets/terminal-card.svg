<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1000" y2="300">
      <stop stop-color="#050505"/>
      <stop offset=".55" stop-color="#111111"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff2c6"/>
      <stop offset=".55" stop-color="#c59b46"/>
      <stop offset="1" stop-color="#74511d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <style>
      .mono { font-family: "Consolas", "Courier New", monospace; }
      .title { fill:#f8fafc; font-size:18px; font-weight:700; letter-spacing:2px; }
      .line { fill:#d1d5db; font-size:18px; }
      .label { fill:#d6a84f; font-size:17px; font-weight:700; }
      .muted { fill:#9ca3af; font-size:15px; }
      .pulse { animation:pulse 3s ease-in-out infinite; }
      .cursor { animation:blink 1s steps(2) infinite; }
      @keyframes pulse { 0%,100% { opacity:.42; } 50% { opacity:1; } }
      @keyframes blink { 0%,45% { opacity:1; } 46%,100% { opacity:0; } }
    </style>
  </defs>
  <rect width="1000" height="300" rx="22" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="1" y="1" width="998" height="298" rx="21" stroke="#27272a" stroke-width="2"/>
  <rect x="32" y="28" width="936" height="50" rx="14" fill="#0b0b0c"/>
  <circle cx="64" cy="53" r="7" fill="#7f1d1d"/>
  <circle cx="91" cy="53" r="7" fill="#a16207"/>
  <circle cx="118" cy="53" r="7" fill="#365314"/>
  <text x="150" y="59" class="mono muted">ana-montes@portfolio: ~/identity</text>
  <path d="M42 102H958" stroke="#27272a"/>
  <text x="52" y="132" class="mono title">$ profile --summary</text>
  <text x="52" y="170" class="mono line"><tspan class="label">Name</tspan>       Ana Montes</text>
  <text x="52" y="202" class="mono line"><tspan class="label">Role</tspan>       Systems Engineering Student</text>
  <text x="52" y="234" class="mono line"><tspan class="label">Focus</tspan>      Frontend, Backend, Databases</text>
  <text x="52" y="266" class="mono line"><tspan class="label">Mission</tspan>    Build a strong, elegant tech portfolio <tspan class="cursor">_</tspan></text>
  <g class="pulse">
    <rect x="755" y="126" width="152" height="40" rx="12" fill="#111111" stroke="url(#gold)"/>
    <text x="785" y="152" class="mono label">LEARNING</text>
    <rect x="755" y="184" width="152" height="40" rx="12" fill="#111111" stroke="url(#gold)"/>
    <text x="785" y="210" class="mono label">BUILDING</text>
  </g>
</svg>
