<svg width="1000" height="310" viewBox="0 0 1000 310" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="310">
      <stop stop-color="#020617"/>
      <stop offset=".55" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "Consolas", "Courier New", monospace; }
      .cmd { fill:#67e8f9; font-size:18px; filter:url(#glow); }
      .line { fill:#dbeafe; font-size:18px; }
      .muted { fill:#94a3b8; font-size:15px; }
      .label { fill:#22d3ee; font-size:17px; font-weight:700; }
      .scan { animation: scan 4.6s ease-in-out infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      .cursor { animation: blink 1s steps(2) infinite; }
      @keyframes scan { 0%,100% { transform: translateX(-320px); opacity:0; } 50% { transform: translateX(320px); opacity:1; } }
      @keyframes pulse { 0%,100% { opacity:.42; } 50% { opacity:1; } }
      @keyframes blink { 0%,45% { opacity:1; } 46%,100% { opacity:0; } }
    </style>
  </defs>
  <rect width="1000" height="310" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="998" height="308" rx="21" stroke="#1e293b" stroke-width="2"/>
  <rect x="26" y="24" width="948" height="52" rx="14" fill="#0f172a"/>
  <circle cx="56" cy="50" r="7" fill="#ef4444"/>
  <circle cx="82" cy="50" r="7" fill="#f59e0b"/>
  <circle cx="108" cy="50" r="7" fill="#10b981"/>
  <text x="136" y="56" class="mono muted">mission-control@github: ~/ana-montes/profile</text>

  <g class="scan">
    <rect x="280" y="92" width="440" height="2" fill="#22d3ee" opacity=".75"/>
    <rect x="340" y="268" width="320" height="2" fill="#38bdf8" opacity=".6"/>
  </g>

  <text x="44" y="118" class="mono cmd">$ initialize_profile --mode elegant-future</text>
  <text x="44" y="158" class="mono line"><tspan class="label">USER</tspan>       : Ana Montes / user-ana</text>
  <text x="44" y="190" class="mono line"><tspan class="label">TRACK</tspan>      : Systems Engineering</text>
  <text x="44" y="222" class="mono line"><tspan class="label">FOCUS</tspan>      : Frontend, Backend, Databases, Software</text>
  <text x="44" y="254" class="mono line"><tspan class="label">MISSION</tspan>    : Build clean projects for portfolio and CV</text>
  <text x="44" y="286" class="mono line"><tspan class="label">STATUS</tspan>     : Online and learning <tspan class="cursor">_</tspan></text>

  <g class="pulse">
    <circle cx="842" cy="138" r="38" stroke="#22d3ee" stroke-width="2" opacity=".8"/>
    <circle cx="842" cy="138" r="6" fill="#67e8f9" filter="url(#glow)"/>
    <path d="M842 100V83M842 193V176M804 138H787M897 138H880" stroke="#38bdf8" stroke-width="2"/>
    <text x="774" y="238" class="mono muted">SIGNAL: STABLE</text>
    <text x="774" y="264" class="mono muted">PORTFOLIO: ACTIVE</text>
  </g>
</svg>
