<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "Consolas", "Courier New", monospace; }
      .line { fill: #cbd5e1; font-size: 18px; }
      .cmd { fill: #38bdf8; font-size: 18px; filter: url(#glow); }
      .label { fill: #22d3ee; font-size: 17px; font-weight: 700; }
      .cursor { animation: blink 1s steps(2) infinite; }
      @keyframes blink { 0%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }
    </style>
  </defs>
  <rect width="900" height="300" rx="18" fill="#020617"/>
  <rect x="1" y="1" width="898" height="298" rx="18" stroke="#1e293b" stroke-width="2"/>
  <rect x="24" y="22" width="852" height="48" rx="12" fill="#0f172a"/>
  <circle cx="52" cy="46" r="7" fill="#ef4444"/>
  <circle cx="78" cy="46" r="7" fill="#f59e0b"/>
  <circle cx="104" cy="46" r="7" fill="#10b981"/>
  <text x="135" y="53" class="mono" fill="#94a3b8" font-size="16">profile@github: ~/about-me</text>

  <text x="42" y="108" class="mono cmd">$ whoami --verbose</text>
  <text x="42" y="148" class="mono line"><tspan class="label">NAME</tspan>       : Ana Montes</text>
  <text x="42" y="180" class="mono line"><tspan class="label">ROLE</tspan>       : Systems Engineering Student</text>
  <text x="42" y="212" class="mono line"><tspan class="label">FOCUS</tspan>      : Frontend, Backend, Databases</text>
  <text x="42" y="244" class="mono line"><tspan class="label">PROJECT</tspan>    : High Availability with Virtual IP</text>
  <text x="42" y="276" class="mono line"><tspan class="label">STATUS</tspan>     : Building portfolio <tspan class="cursor">_</tspan></text>
</svg>
