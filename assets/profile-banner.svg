<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430">
      <stop stop-color="#050505"/>
      <stop offset="0.45" stop-color="#111111"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d48a" stop-opacity="0.38"/>
      <stop offset="48%" stop-color="#b99045" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff2c6"/>
      <stop offset="0.45" stop-color="#d6a84f"/>
      <stop offset="1" stop-color="#7c5a1f"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title {
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 70px;
        font-weight: 900;
        letter-spacing: 12px;
        fill: #f8fafc;
        filter: url(#titleGlow);
      }
      .subtitle {
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 7px;
        fill: #d6a84f;
      }
      .small {
        font-family: "Consolas", "Courier New", monospace;
        font-size: 14px;
        letter-spacing: 4px;
        fill: #9ca3af;
      }
      .fade { animation: fade 4s ease-in-out infinite; }
      .slowFloat { animation: slowFloat 7s ease-in-out infinite; }
      .draw { stroke-dasharray: 520; stroke-dashoffset: 520; animation: draw 5s ease-in-out infinite; }
      .starA { animation: star 2.6s ease-in-out infinite; }
      .starB { animation: star 3.5s ease-in-out infinite; }
      @keyframes fade { 0%,100% { opacity:.46; } 50% { opacity:1; } }
      @keyframes slowFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
      @keyframes draw { 0% { stroke-dashoffset:520; opacity:.15; } 45%,65% { stroke-dashoffset:0; opacity:.9; } 100% { stroke-dashoffset:-520; opacity:.15; } }
      @keyframes star { 0%,100% { opacity:.2; } 50% { opacity:.9; } }
    </style>
  </defs>

  <rect width="1200" height="430" rx="30" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="427" rx="28.5" stroke="#27272a" stroke-width="3"/>
  <rect x="42" y="42" width="1116" height="346" rx="24" fill="#080808" opacity="0.72" filter="url(#softShadow)"/>
  <rect x="43" y="43" width="1114" height="344" rx="23" stroke="#2f2f35" stroke-width="2"/>

  <circle cx="230" cy="215" r="210" fill="url(#goldGlow)" class="slowFloat"/>
  <circle cx="958" cy="210" r="180" fill="url(#goldGlow)" opacity="0.72" class="slowFloat"/>

  <g opacity="0.18">
    <path d="M120 104H1080" stroke="#e5e7eb"/>
    <path d="M120 326H1080" stroke="#e5e7eb"/>
    <path d="M198 72V358" stroke="#e5e7eb"/>
    <path d="M1002 72V358" stroke="#e5e7eb"/>
  </g>

  <g>
    <circle cx="170" cy="146" r="2" fill="#f8fafc" class="starA"/>
    <circle cx="296" cy="292" r="2.4" fill="#d6a84f" class="starB"/>
    <circle cx="442" cy="128" r="1.9" fill="#f8fafc" class="starA"/>
    <circle cx="724" cy="315" r="2.2" fill="#d6a84f" class="starB"/>
    <circle cx="1042" cy="152" r="2.4" fill="#f8fafc" class="starA"/>
    <circle cx="932" cy="304" r="1.8" fill="#d6a84f" class="starB"/>
  </g>

  <g class="slowFloat">
    <text x="600" y="145" text-anchor="middle" class="small">SYSTEMS ENGINEERING  /  SOFTWARE  /  DATABASES</text>
    <text x="600" y="225" text-anchor="middle" class="title">ANA MONTES</text>
    <text x="600" y="275" text-anchor="middle" class="subtitle">DEVELOPER PORTFOLIO</text>
    <text x="600" y="323" text-anchor="middle" class="small">building clean, useful and elegant technology</text>
  </g>

  <g opacity="0.95">
    <path d="M95 95H215" stroke="url(#gold)" stroke-width="3"/>
    <path d="M95 95V205" stroke="url(#gold)" stroke-width="3"/>
    <path d="M1105 95H985" stroke="url(#gold)" stroke-width="3"/>
    <path d="M1105 95V205" stroke="url(#gold)" stroke-width="3"/>
    <path d="M95 335H215" stroke="url(#gold)" stroke-width="3"/>
    <path d="M95 335V225" stroke="url(#gold)" stroke-width="3"/>
    <path d="M1105 335H985" stroke="url(#gold)" stroke-width="3"/>
    <path d="M1105 335V225" stroke="url(#gold)" stroke-width="3"/>
  </g>

  <path d="M352 352C462 378 740 378 848 352" stroke="url(#gold)" stroke-width="2" class="draw"/>
  <path d="M352 78C462 52 740 52 848 78" stroke="url(#gold)" stroke-width="2" class="draw"/>
  <circle cx="600" cy="360" r="4" fill="#d6a84f" class="fade"/>
  <circle cx="600" cy="70" r="4" fill="#d6a84f" class="fade"/>
</svg>
