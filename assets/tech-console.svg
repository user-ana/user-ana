<svg width="1000" height="245" viewBox="0 0 1000 245" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="245">
      <stop stop-color="#050505"/>
      <stop offset=".5" stop-color="#111111"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f8e7b0"/>
      <stop offset=".55" stop-color="#c59b46"/>
      <stop offset="1" stop-color="#765827"/>
    </linearGradient>
    <style>
      .mono { font-family:"Consolas","Courier New",monospace; }
      .head { fill:#f8fafc; font-size:18px; font-weight:700; letter-spacing:3px; }
      .text { fill:#d1d5db; font-size:17px; }
      .gold { fill:#d6a84f; font-size:17px; font-weight:700; }
      .shine { animation:shine 4s ease-in-out infinite; }
      @keyframes shine { 0%,100% { opacity:.35; } 50% { opacity:1; } }
    </style>
  </defs>
  <rect width="1000" height="245" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="998" height="243" rx="21" stroke="#27272a" stroke-width="2"/>
  <path d="M40 64H960" stroke="#27272a"/>
  <path d="M40 184H960" stroke="#27272a"/>
  <text x="50" y="44" class="mono head">TECH STACK</text>
  <text x="50" y="95" class="mono text"><tspan class="gold">Frontend</tspan>   HTML, CSS, JavaScript, TypeScript, React, Next.js, Tailwind</text>
  <text x="50" y="130" class="mono text"><tspan class="gold">Backend</tspan>    Python, Java, C#, Node.js, Express, .NET, PHP</text>
  <text x="50" y="165" class="mono text"><tspan class="gold">Data</tspan>       MySQL, PostgreSQL, MongoDB, SQLite</text>
  <text x="50" y="214" class="mono text">Git, GitHub, VS Code, Postman, Docker, Linux</text>
  <circle cx="910" cy="42" r="5" fill="#d6a84f" class="shine"/>
  <circle cx="936" cy="42" r="5" fill="#9ca3af" class="shine"/>
  <circle cx="962" cy="42" r="5" fill="#d6a84f" class="shine"/>
</svg>
